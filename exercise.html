<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Ejercicio</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet">
        <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link
        rel="stylesheet"
        href="css/styles.css">

</head>

<body>

    <div class="exercise-page">

        <div class="workout-navbar">

            <button
                onclick="history.back()"
                class="workout-nav-btn">
        
                <i class="bi bi-arrow-left-circle"></i>
        
            </button>        
        </div>
    
        <h1
            id="exerciseTitle"
            class="workout-title">
        </h1>
    
        <p
            id="exerciseInfo"
            class="exercise-info">
        </p>
    
        <div id="exerciseVideo"></div>
    
        <div class="mt-4">
    
            <label class="form-label">
                Peso
            </label>
    
            <input
                id="exerciseWeight"
                type="text"
                class="form-control">
    
        </div>
    
        <div class="mt-3">
    
            <label class="form-label">
                Notas
            </label>
    
            <textarea
                id="exerciseNotes"
                rows="5"
                class="form-control">
            </textarea>
    
        </div>
    
        <button
            id="saveExerciseBtn"
            class="workout-finish-btn">
    
            Guardar
    
        </button>
    
    </div>

    <script src="js/exercisesData.js"></script>
    <script src="js/exercise.js"></script>

</body>

</html>
