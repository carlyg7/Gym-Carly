<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Workout</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link
        rel="stylesheet"
        href="css/styles.css">

</head>

<body>

    <div class="workout-page">

        <button
            onclick="history.back()"
            class="workout-back-btn">

            ←

        </button>

        <h1
            id="workoutTitle"
            class="workout-title">
        </h1>

        <div
            id="workoutExercises">
        </div>

        <button
            id="finishWorkoutBtn"
            class="workout-finish-btn">

            Finalizar entrenamiento

        </button>

    </div>
    
    <script src="js/exercisesData.js"></script>
    <script src="js/workout.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
